# Self-hosted sync server for Blank (AFFiNE-compatible).
# Docs: https://docs.affine.pro/self-host-affine/
#
# Usage:
#   cd scripts/selfhost
#   copy .env.example .env   # set AFFINE_SERVER_HTTPS and secrets
#   docker compose up -d

services:
  affine:
    image: ghcr.io/toeverything/affine-graphql:${AFFINE_REVISION:-stable}
    container_name: blank-sync-affine
    ports:
      - '${AFFINE_PORT:-3010}:3010'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - affine_data:/root/.affine/storage
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-affine}:${POSTGRES_PASSWORD:-affine}@postgres:5432/${POSTGRES_DB:-affine}
      AFFINE_SERVER_HTTPS: ${AFFINE_SERVER_HTTPS:-false}
      AFFINE_SERVER_HOST: ${AFFINE_SERVER_HOST:-localhost}
      AFFINE_SERVER_PORT: '3010'
    restart: unless-stopped

  affine_migration:
    image: ghcr.io/toeverything/affine-graphql:${AFFINE_REVISION:-stable}
    container_name: blank-sync-migration
    volumes:
      - affine_data:/root/.affine/storage
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-affine}:${POSTGRES_PASSWORD:-affine}@postgres:5432/${POSTGRES_DB:-affine}

  redis:
    image: redis
    container_name: blank-sync-redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: blank-sync-postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-affine}']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-affine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-affine}
      POSTGRES_DB: ${POSTGRES_DB:-affine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  affine_data:
  postgres_data:
