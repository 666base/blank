<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=<%= VIEWPORT_FIT %>"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Blank</title>
    <meta name="theme-color" content="#121212" />
    <%= PRECONNECT %>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/favicon-192.png" />
    <link rel="shortcut icon" href="/favicon.ico?v=3" />
    <meta name="emotion-insertion-point" content="" />
    <meta property="description" content="<%= DESCRIPTION %>" />
  </head>

  <body>
    <div id="app" data-version="<%= GIT_SHORT_SHA %>">
      <div
        id="blank-boot-splash"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          min-height: 100vh;
          margin: 0;
          font-family: system-ui, sans-serif;
          background: #121212;
          color: #e8e8e8;
        "
      >
        <img
          src="/imgs/blank-app-icon.png"
          width="64"
          height="64"
          alt=""
          style="border-radius: 14px"
        />
        <span style="font-size: 15px; letter-spacing: 0.02em">Loading Blank…</span>
      </div>
    </div>
  </body>
</html>
