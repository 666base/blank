# Blank server — Docker (Supabase cloud + optional local Postgres).
#
# Default: API proxy on :3020 (reads SUPABASE_* from .env)
# With local DB: docker compose --profile local-db up -d
#
# npm run blank:server:up
# npm run blank:server:down

name: blank

services:
  api:
    build: ./services/blank-server
    container_name: blank-server-api
    env_file:
      - ./services/blank-server/.env
    environment:
      BLANK_SERVER_HOST: 0.0.0.0
      BLANK_SERVER_PORT: 3020
    ports:
      - '${BLANK_SERVER_PORT:-3020}:3020'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3020/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres:
    profiles: ['local-db']
    image: postgres:16-alpine
    container_name: blank-server-postgres
    environment:
      POSTGRES_USER: blank
      POSTGRES_PASSWORD: ${BLANK_DB_PASSWORD:-blank-dev-change-me}
      POSTGRES_DB: blank
    ports:
      - '${BLANK_DB_PORT:-5433}:5432'
    volumes:
      - blank_server_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blank -d blank']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  blank_server_pg:
